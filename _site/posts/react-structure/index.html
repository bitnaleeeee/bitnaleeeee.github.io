<div class="language-javascript highlighter-rouge"><div class="highlight"><pre class="highlight"><code>    <span class="nx">title</span><span class="o">=</span><span class="p">{</span><span class="s2">`메모 : </span><span class="p">${</span><span class="nx">user</span><span class="p">.</span><span class="nx">memo</span><span class="p">}</span><span class="s2">`</span><span class="p">}</span>
